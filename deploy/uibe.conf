# AI导师 Nginx 配置
# 适用于 aitutor.uibe.online 或 lab.uibe.edu.cn/aitutor

upstream tutor_server {
    server 127.0.0.1:3002;
    keepalive 64;
}

# 独立域名方式：aitutor.uibe.online
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aitutor.uibe.online;

    if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|OPTIONS)$ ) {
        return 405;
    }

    ssl_certificate /etc/nginx/ssl/cloudflare-origin.pem;
    ssl_certificate_key /etc/nginx/ssl/cloudflare-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /home/flaskappuser/Desktop/NewDisk_2T/new_fastapi.git/logs/nginx_aitutor_access.log;
    error_log /home/flaskappuser/Desktop/NewDisk_2T/new_fastapi.git/logs/nginx_aitutor_error.log;

    client_max_body_size 50M;

    # API 请求代理到后端
    location ^~ /api/ {
        proxy_pass http://tutor_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # 静态文件直接由 Nginx 服务
    location / {
        root /home/flaskappuser/Desktop/NewDisk_2T/new_fastapi.git/aitutor/public;
        try_files $uri $uri/ /index.html;

        # 图片和静态资源缓存
        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|js|css)$ {
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
        }
    }
}

# HTTP 重定向到 HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name aitutor.uibe.online;

    server_tokens off;

    if ($request_method !~ ^(GET|HEAD|POST)$ ) {
        return 405;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 子路径方式：lab.uibe.edu.cn/aitutor
# 将此配置块添加到主站 uibe.conf 的对应位置
