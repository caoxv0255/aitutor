<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#007aff" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="styles.css?v=5" />
    <title>知识图谱 · 智启AI导师</title>
    <style>
      /* ── 页面布局 ── */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, 'SF Pro Display', 'PingFang SC', sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        overflow: hidden;
        height: 100vh;
      }

      .app-shell {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      /* ── 顶栏 ── */
      .top-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 20px;
        background: var(--glass-bg);
        backdrop-filter: blur(var(--glass-blur));
        border-bottom: 1px solid var(--separator);
        z-index: 20;
        flex-shrink: 0;
      }
      .top-bar h1 {
        font-size: 1.1rem;
        font-weight: 700;
      }
      .top-bar .back-link {
        font-size: 0.85rem;
        color: var(--system-blue);
        text-decoration: none;
      }

      /* ── 统计卡片 ── */
      .stats-row {
        display: flex;
        gap: 12px;
        padding: 12px 20px;
        flex-shrink: 0;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      .stat-chip {
        flex-shrink: 0;
        background: var(--bg-secondary);
        border-radius: 12px;
        padding: 10px 16px;
        text-align: center;
        min-width: 80px;
        box-shadow: var(--shadow-sm);
      }
      .stat-chip .val {
        font-size: 1.4rem;
        font-weight: 700;
      }
      .stat-chip .lbl {
        font-size: 0.7rem;
        color: var(--text-secondary);
        margin-top: 2px;
      }
      .stat-chip.green .val {
        color: var(--system-green);
      }
      .stat-chip.orange .val {
        color: var(--system-orange);
      }
      .stat-chip.red .val {
        color: var(--system-red);
      }

      /* ── 图谱区域 ── */
      .graph-area {
        flex: 1;
        position: relative;
        overflow: hidden;
      }
      #cy {
        width: 100%;
        height: 100%;
      }

      /* ── 图例 ── */
      .legend {
        position: absolute;
        bottom: 16px;
        left: 16px;
        background: var(--glass-bg);
        backdrop-filter: blur(var(--glass-blur));
        border-radius: 12px;
        padding: 12px 16px;
        box-shadow: var(--shadow-md);
        z-index: 10;
        font-size: 0.75rem;
        line-height: 1.8;
      }
      .legend-title {
        font-weight: 700;
        margin-bottom: 4px;
        font-size: 0.8rem;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .legend-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .legend-dot.green {
        background: var(--system-green);
      }
      .legend-dot.orange {
        background: var(--system-orange);
      }
      .legend-dot.red {
        background: var(--system-red);
      }
      .legend-dot.gray {
        background: var(--gray-400);
      }

      /* ── 学科过滤 ── */
      .subject-filter {
        position: absolute;
        top: 12px;
        left: 16px;
        z-index: 10;
        background: var(--glass-bg);
        backdrop-filter: blur(var(--glass-blur));
        border-radius: 12px;
        padding: 8px 12px;
        box-shadow: var(--shadow-md);
      }
      .subject-filter select {
        border: none;
        background: transparent;
        color: var(--text-primary);
        font-size: 0.85rem;
        outline: none;
        font-family: inherit;
      }

      /* ── 侧边栏详情面板 ── */
      .detail-panel {
        position: absolute;
        top: 0;
        right: 0;
        width: 380px;
        max-width: 90vw;
        height: 100%;
        background: var(--bg-secondary);
        box-shadow: -4px 0 30px rgba(0, 0, 0, 0.15);
        transform: translateX(100%);
        transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 30;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
      .detail-panel.open {
        transform: translateX(0);
      }
      .detail-panel .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        border-bottom: 1px solid var(--separator);
        position: sticky;
        top: 0;
        background: var(--bg-secondary);
        z-index: 1;
      }
      .detail-panel .panel-header h2 {
        font-size: 1rem;
        font-weight: 700;
      }
      .detail-panel .close-btn {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: none;
        background: var(--fill-primary);
        color: var(--text-secondary);
        font-size: 1.1rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .detail-panel .panel-body {
        padding: 20px;
      }

      /* ── 详情卡片 ── */
      .info-card {
        background: var(--bg-primary);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
      }
      .info-card .card-label {
        font-size: 0.7rem;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 8px;
        font-weight: 600;
      }
      .mastery-bar {
        height: 8px;
        background: var(--fill-secondary);
        border-radius: 4px;
        overflow: hidden;
        margin-top: 8px;
      }
      .mastery-bar .fill {
        height: 100%;
        border-radius: 4px;
        transition: width 0.5s ease;
      }
      .mastery-score {
        font-size: 2rem;
        font-weight: 800;
      }

      .path-step {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 10px 0;
        border-bottom: 1px solid var(--separator);
      }
      .path-step:last-child {
        border-bottom: none;
      }
      .step-num {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: var(--system-blue);
        color: #fff;
        font-size: 0.75rem;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .step-content {
        flex: 1;
      }
      .step-content .step-action {
        font-size: 0.85rem;
        font-weight: 600;
      }
      .step-content .step-target {
        font-size: 0.8rem;
        color: var(--text-secondary);
      }
      .step-content .step-reason {
        font-size: 0.75rem;
        color: var(--text-tertiary);
        margin-top: 2px;
      }

      .tag {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 0.72rem;
        font-weight: 600;
        margin-right: 4px;
        margin-bottom: 4px;
      }
      .tag.weak {
        background: rgba(255, 59, 48, 0.12);
        color: var(--system-red);
      }
      .tag.strong {
        background: rgba(52, 199, 89, 0.12);
        color: var(--system-green);
      }
      .tag.info {
        background: rgba(0, 122, 255, 0.12);
        color: var(--system-blue);
      }

      .ask-btn {
        display: block;
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        border: none;
        background: var(--system-blue);
        color: #fff;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        margin-top: 16px;
        font-family: inherit;
        transition: opacity 0.2s;
      }
      .ask-btn:hover {
        opacity: 0.85;
      }
      .ask-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* ── 加载 & 空状态 ── */
      .loading-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--bg-primary);
        z-index: 50;
        transition: opacity 0.3s;
      }
      .loading-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid var(--separator);
        border-top-color: var(--system-blue);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .loading-text {
        margin-top: 12px;
        font-size: 0.85rem;
        color: var(--text-secondary);
      }

      /* ── 移动端适配 ── */
      @media (max-width: 640px) {
        .detail-panel {
          width: 100%;
          max-width: 100%;
        }
        .legend {
          bottom: 8px;
          left: 8px;
          padding: 8px 12px;
          font-size: 0.7rem;
        }
        .stats-row {
          padding: 8px 12px;
          gap: 8px;
        }
        .stat-chip {
          padding: 8px 12px;
          min-width: 68px;
        }
        .stat-chip .val {
          font-size: 1.1rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <!-- 顶栏 -->
      <div class="top-bar">
        <a href="/index.html" class="back-link">← 返回</a>
        <h1>知识图谱 · 学情总览</h1>
        <span style="width: 48px"></span>
      </div>

      <!-- 统计卡片 -->
      <div class="stats-row" id="statsRow">
        <div class="stat-chip">
          <div class="val" id="statTotal">-</div>
          <div class="lbl">知识点总数</div>
        </div>
        <div class="stat-chip green">
          <div class="val" id="statMastered">-</div>
          <div class="lbl">已掌握</div>
        </div>
        <div class="stat-chip orange">
          <div class="val" id="statLearning">-</div>
          <div class="lbl">学习中</div>
        </div>
        <div class="stat-chip red">
          <div class="val" id="statWeak">-</div>
          <div class="lbl">薄弱</div>
        </div>
        <div class="stat-chip">
          <div class="val" id="statEdges">-</div>
          <div class="lbl">依赖关系</div>
        </div>
      </div>

      <!-- 图谱区 -->
      <div class="graph-area">
        <div class="subject-filter">
          <select id="subjectFilter">
            <option value="">全部学科</option>
            <option value="数学">数学</option>
            <option value="语文">语文</option>
            <option value="英语">英语</option>
            <option value="物理">物理</option>
            <option value="化学">化学</option>
            <option value="生物">生物</option>
            <option value="历史">历史</option>
            <option value="地理">地理</option>
            <option value="政治">政治</option>
          </select>
        </div>

        <div id="cy"></div>

        <div class="legend">
          <div class="legend-title">掌握度图例</div>
          <div class="legend-item"><span class="legend-dot green"></span> 已掌握 (≥ 0.7)</div>
          <div class="legend-item"><span class="legend-dot orange"></span> 学习中 (0.4 – 0.7)</div>
          <div class="legend-item"><span class="legend-dot red"></span> 薄弱 (&lt; 0.4)</div>
          <div class="legend-item"><span class="legend-dot gray"></span> 未评估</div>
        </div>

        <!-- 加载遮罩 -->
        <div class="loading-overlay" id="loadingOverlay">
          <div class="spinner"></div>
          <div class="loading-text">加载知识图谱中...</div>
        </div>
      </div>

      <!-- 侧边栏 -->
      <div class="detail-panel" id="detailPanel">
        <div class="panel-header">
          <h2 id="panelTitle">知识点详情</h2>
          <button class="close-btn" id="closePanel" aria-label="关闭">×</button>
        </div>
        <div class="panel-body" id="panelBody">
          <div style="text-align: center; padding: 40px; color: var(--text-tertiary)">点击图谱中的节点查看详情</div>
        </div>
      </div>
    </div>

    <!-- Cytoscape.js CDN -->
    <script src="https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
    <script type="module" src="src/js/mastery-graph.js?v=1"></script>
  </body>
</html>
