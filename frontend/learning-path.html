<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>学习路径 - AI Tutor</title>
<link rel="stylesheet" href="assets/css/style.css">
<style>
.learning-wrap{max-width:900px;margin:0 auto;padding:40px 24px 60px}
.learning-header{margin-bottom:36px;text-align:center}
.learning-header h1{font-size:1.8rem;font-weight:800;margin-bottom:8px}
.learning-header p{font-size:.9rem;color:var(--text-muted)}
.subject-selector{display:flex;justify-content:center;gap:8px;margin-bottom:32px;flex-wrap:wrap}
.subject-btn{padding:10px 20px;border-radius:var(--radius-pill);border:1px solid var(--border);background:transparent;color:var(--text);font-size:.9rem;font-weight:600;cursor:pointer;transition:var(--transition)}
.subject-btn:hover{border-color:var(--accent);color:var(--accent)}
.subject-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.loading-state{text-align:center;padding:60px 24px;color:var(--text-muted)}
.loading-spinner{width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.recommendation-box{background:var(--accent-soft);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:32px}
.recommendation-box h2{font-size:1.1rem;font-weight:700;margin-bottom:12px;color:var(--accent)}
.recommendation-box p{font-size:.95rem;line-height:1.7;color:var(--text)}
.analysis-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:32px}
.analysis-box h2{font-size:1.1rem;font-weight:700;margin-bottom:16px}
.analysis-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.analysis-stat{text-align:center;padding:16px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm)}
.analysis-stat .stat-value{font-size:2rem;font-weight:800;color:var(--accent)}
.analysis-stat .stat-label{font-size:.8rem;color:var(--text-muted);margin-top:4px}
.phase-timeline{position:relative;padding-left:40px}
.phase-timeline::before{content:'';position:absolute;left:16px;top:0;bottom:0;width:2px;background:var(--border)}
.phase-item{position:relative;margin-bottom:32px}
.phase-dot{position:absolute;left:-32px;top:0;width:20px;height:20px;border-radius:50%;background:var(--accent);border:3px solid var(--bg);z-index:1}
.phase-dot.completed{background:#22c55e}
.phase-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
.phase-card h3{font-size:1.15rem;font-weight:700;margin-bottom:4px}
.phase-card .phase-week{font-size:.8rem;color:var(--accent);font-weight:600;margin-bottom:12px}
.phase-card .phase-focus{font-size:1rem;font-weight:600;margin-bottom:8px}
.phase-topics{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.phase-topic{padding:4px 12px;background:var(--bg);border:1px solid var(--border);border-radius:999px;font-size:.82rem}
.phase-card .phase-goal{font-size:.9rem;color:var(--text-muted);padding:12px;background:var(--bg);border-radius:var(--radius-sm)}
.phase-card .phase-goal strong{color:var(--text)}
.difficulty-badge{display:inline-block;padding:2px 10px;border-radius:999px;font-size:.75rem;font-weight:600;margin-left:8px}
.difficulty-badge.easy{background:#dcfce7;color:#166534}
.difficulty-badge.medium{background:#fef3c7;color:#92400e}
.difficulty-badge.hard{background:#fecaca;color:#991b1b}
.difficulty-badge.comprehensive{background:#e0e7ff;color:#3730a3}
.action-buttons{display:flex;justify-content:center;gap:12px;margin-top:40px;flex-wrap:wrap}
.action-btn{padding:12px 28px;border-radius:var(--radius-pill);font-size:.95rem;font-weight:600;cursor:pointer;transition:var(--transition);border:1px solid var(--border);font-family:var(--font)}
.action-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.action-btn.primary:hover{box-shadow:0 8px 32px rgba(215,25,32,.3)}
.action-btn.secondary{background:transparent;color:var(--text);border-color:var(--border)}
.action-btn.secondary:hover{border-color:var(--accent);color:var(--accent)}
.no-data{text-align:center;padding:80px 24px;color:var(--text-muted)}
.no-data .empty-icon{font-size:4rem;margin-bottom:16px}
</style>
</head>
<body>

<div class="learning-wrap">
  <div class="learning-header">
    <h1>学习路径规划</h1>
    <p>根据你的薄弱知识点，为你量身定制分阶段学习计划</p>
  </div>

  <div class="subject-selector" id="subjectSelector">
    <button class="subject-btn active" data-subject="math" onclick="loadLearningPath('math')">数学</button>
    <button class="subject-btn" data-subject="physics" onclick="loadLearningPath('physics')">物理</button>
    <button class="subject-btn" data-subject="chemistry" onclick="loadLearningPath('chemistry')">化学</button>
    <button class="subject-btn" data-subject="chinese" onclick="loadLearningPath('chinese')">语文</button>
    <button class="subject-btn" data-subject="english" onclick="loadLearningPath('english')">英语</button>
    <button class="subject-btn" data-subject="politics" onclick="loadLearningPath('politics')">政治</button>
  </div>

  <div class="loading-state" id="loadingState">正在加载学习路径...</div>

  <div id="pathContent" style="display:none"></div>

  <div class="no-data" id="noData" style="display:none">
    <div class="empty-icon">📚</div>
    <p>暂无数据</p>
    <p style="margin-top:12px">请先上传一些错题记录，以便生成个性化学习路径</p>
  </div>
</div>

<script>
(function() {
  const token = localStorage.getItem('token');
  if (!token) { location.href = 'login.html'; return; }
  loadLearningPath('math');
})();

async function loadLearningPath(subject) {
  const token = localStorage.getItem('token');
  const loading = document.getElementById('loadingState');
  const content = document.getElementById('pathContent');
  const noData = document.getElementById('noData');

  // Update active button
  document.querySelectorAll('.subject-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.subject === subject);
  });

  loading.style.display = 'block';
  content.style.display = 'none';
  noData.style.display = 'none';

  try {
    const res = await fetch('/api/learning-path?subject=' + subject, {
      headers: {
        'Authorization': 'Bearer ' + token
      }
    });

    if (res.status === 401) {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      location.href = 'login.html';
      return;
    }

    if (!res.ok) throw new Error('获取失败');
    const data = await res.json();
    
    renderLearningPath(data);

  } catch (err) {
    loading.style.display = 'none';
    noData.style.display = 'block';
  }
}

function renderLearningPath(data) {
  const loading = document.getElementById('loadingState');
  const content = document.getElementById('pathContent');

  loading.style.display = 'none';
  content.style.display = 'block';

  let html = '';

  // Recommendation
  html += '<div class="recommendation-box">' +
    '<h2>💡 学习建议</h2>' +
    '<p>' + data.recommendation + '</p>' +
  '</div>';

  // Analysis stats
  html += '<div class="analysis-box">' +
    '<h2>📊 学习分析</h2>' +
    '<div class="analysis-grid">' +
      '<div class="analysis-stat">' +
        '<div class="stat-value">' + (data.analysis.totalWrongQuestions || 0) + '</div>' +
        '<div class="stat-label">错题记录</div>' +
      '</div>' +
      '<div class="analysis-stat">' +
        '<div class="stat-value">' + (data.analysis.weakPoints || []).length + '</div>' +
        '<div class="stat-label">薄弱点</div>' +
      '</div>' +
      '<div class="analysis-stat">' +
        '<div class="stat-value">' + (data.analysis.strongPoints || []).length + '</div>' +
        '<div class="stat-label">已掌握</div>' +
      '</div>' +
      '<div class="analysis-stat">' +
        '<div class="stat-value">' + data.totalWeeks + '</div>' +
        '<div class="stat-label">计划周数</div>' +
      '</div>' +
    '</div>' +
  '</div>';

  // Weak points list
  if (data.analysis.weakPoints && data.analysis.weakPoints.length > 0) {
    html += '<div class="analysis-box">' +
      '<h2>⚠️ 薄弱知识点</h2>' +
      '<div class="phase-topics">';
    data.analysis.weakPoints.forEach(wp => {
      const diffLabel = wp.difficulty >= 4 ? 'hard' : (wp.difficulty >= 3 ? 'medium' : 'easy');
      html += '<span class="phase-topic">' + wp.name + 
        ' <span class="difficulty-badge ' + diffLabel + '">' + wp.count + '次错</span></span>';
    });
    html += '</div></div>';
  }

  // Learning phases timeline
  html += '<h2 style="font-size:1.2rem;font-weight:700;margin-bottom:24px">📅 分阶段学习计划</h2>';
  html += '<div class="phase-timeline">';

  (data.phases || []).forEach(phase => {
    const diffClass = phase.difficulty || 'medium';
    const diffLabelMap = { 'easy': '基础', 'medium': '进阶', 'hard': '突破', 'comprehensive': '综合' };
    
    html += '<div class="phase-item">' +
      '<div class="phase-dot"></div>' +
      '<div class="phase-card">' +
        '<div class="phase-week">第' + phase.week + '周 ' +
          '<span class="difficulty-badge ' + diffClass + '">' + (diffLabelMap[diffClass] || diffClass) + '</span>' +
        '</div>' +
        '<h3>' + phase.focus + '</h3>' +
        '<div class="phase-topics">';
    (phase.topics || []).forEach(topic => {
      html += '<span class="phase-topic">' + topic + '</span>';
    });
    html += '</div>' +
      '<div class="phase-goal"><strong>每日目标：</strong>' + phase.dailyGoal + '</div>' +
      '</div>' +
    '</div>';
  });

  html += '</div>';

  // Action buttons
  html += '<div class="action-buttons">' +
    '<button class="action-btn secondary" onclick="window.print()">🖨 打印学习计划</button>' +
    '<button class="action-btn primary" onclick="location.href=\\"my-weak-points.html\\"">📊 查看薄弱点</button>' +
  '</div>';

  content.innerHTML = html;
}
</script>


<script src="assets/js/qr.js"></script>
<script src="assets/js/components.js"></script>
<script src="assets/js/theme-utils.js"></script>
</body>
</html>
